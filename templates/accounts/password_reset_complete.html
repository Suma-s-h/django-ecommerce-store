{% extends 'base.html' %}
{% block title %}Password Reset Complete — ShopDjango{% endblock %}
{% block content %}
<section class="section">
  <div class="auth-card" style="text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem">✅</div>
    <h1>Password Updated!</h1>
    <p class="auth-sub" style="margin-top:.5rem">Your password has been set. You can now log in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg full-width" style="margin-top:1rem">Log In</a>
  </div>
</section>
{% endblock %}
