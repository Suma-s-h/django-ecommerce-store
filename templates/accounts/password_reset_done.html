{% extends 'base.html' %}
{% block title %}Check Your Email — ShopDjango{% endblock %}
{% block content %}
<section class="section">
  <div class="auth-card" style="text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem">📧</div>
    <h1>Check Your Email</h1>
    <p class="auth-sub" style="margin-top:.5rem">
      If an account exists for that email, we've sent a password reset link.
      Check your inbox (and spam folder).
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg full-width" style="margin-top:1rem">Back to Login</a>
  </div>
</section>
{% endblock %}
