{% extends 'base.html' %}
{% block title %}Change Password — ShopDjango{% endblock %}
{% block content %}
<section class="section">
  <div class="auth-card">
    <h1>Change Password</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-lg full-width">Update Password</button>
    </form>
  </div>
</section>
{% endblock %}
